<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/output.css" />
    <title>Home</title>
    <script src="/javascript/includefooter.js"></script>
    <script src="/javascript/includetopnav.js"></script>
    <script type="module" src="/javascript/index.js" defer></script>
</head>

<body class="bg-slate-200">
    <!--Reusable component-->
    <div id="topnav"></div>

    <div class="grid grid-cols-3 grid-rows-1">
        <div class="sidenav col-span-1 justify-start flex flex-col items-start p-10 w-4/5 bg-white space-y-3">
            <h4 class="font-bold text-2xl py-5 w-full border-b border-gray-400">
                Shop By Department
            </h4>

            <ul
                class="w-full [&>*]:w-full [&>*]:text-xl justify-start [&>*]:px-1 [&>*]:py-2 duration-200 hover:[&>*]:bg-red-700  hover:[&>*]:text-white">
                <li class="font-bold"><a href="/">All Departments</a></li>
                <li data-category="novels">Novels</li>
                <li data-category="comicsmanga">Comics/Manga</li>
                <li data-category="videogames">Video Games</li>
                <li data-category="electronics">Electronics</li>
                <li data-category="furniture">Furniture</li>
                <li data-category="office">Office</li>
                <li data-category="beauty">Beauty</li>
            </ul>

            <h4 class="font-bold text-2xl py-5 w-full border-b border-gray-400 my-3">Shop By Price Tag</h4>
            <div class="space-y-4 [&>input]:border-2 [&>input]:border-normalred">
                <input id="minPrice" type="number" placeholder="Min" class="p-2 outline-none">
                <p>to</p>
                <input id="maxPrice" type="number" placeholder="Max" class="p-2 outline-none">

                
            </div>
            <button id="applyFilter" class="bg-normalred p-4 text-white font-semibold w-2/5">Apply</button>

            <h4 class="font-bold text-2xl py-5 w-full border-b border-gray-400 my-3">Help & Settings</h4>
            <ul class="[&>*]:text-gray-600">
                <li><a href="/pages/account.php">My Account</a></li>
                <li id="userEmail"></li>
                <li><a href="/pages/auth.php?type=seller">Become a Seller</a></li>
            </ul>

        </div>

        <section id="product_section_id" class="grid grid-cols-[repeat(auto-fill,minmax(160px,1fr))] grid-rows-2 gap-6 col-span-2 p-10 max-h-full [&>*]:shadow-sm">
            
        </section>
    </div>

    <!--Reusable component-->
    <div id="footer"></div>

    
</body>

</html>
