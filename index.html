<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/dist/output.css" />
    <title>Home</title>
    
    <script src="/variables.js"></script>
    <script src="/javascript/includetopnav.js" defer ></script>
    <script src="/javascript/includefooter.js" defer></script>
    <script src="/javascript/index.js" defer></script>
    <!--This is font awesome. A free supply of icons-->
    <script src="https://kit.fontawesome.com/dad52afab5.js" crossorigin="anonymous"></script>
    
</head>

<body class="bg-slate-200">
    <!--Reusable component-->
    <div id="topnav"></div>

    <div id="layout" class="grid grid-cols-1 lg:grid-cols-[250px_1fr] ">
        <div class="sidenav fixed top-0 left-0 h-full w-64 bg-white z-50 lg:z-0 transform -translate-x-full transition-transform duration-300 lg:static lg:translate-x-0 lg:w-auto lg:h-auto overflow-y-auto flex flex-col p-4 lg:p-10 space-y-3">
            <i id="closeid" class="fa-solid fa-x md:!hidden"></i>
            <h4 class="font-bold text-2xl py-5 w-full border-b border-gray-400">
                Shop By Department
            </h4>

            <ul
                class="w-full [&>*]:w-full [&>*]:text-base sm:[&>*]:text-lg lg:[&>*]:text-xl justify-start [&>*]:px-1 [&>*]:py-2 duration-200 hover:[&>*]:bg-red-700  hover:[&>*]:text-white">
                <li class="font-bold"><a href="/">All Departments</a></li>
                <li data-category="Novels">Novels</li>
                <li data-category="Comics/Manga">Comics/Manga</li>
                <li data-category="Video Games">Video Games</li>
                <li data-category="Electronics">Electronics</li>
                <li data-category="Furniture">Furniture</li>
                <li data-category="Office">Office</li>
                <li data-category="Beauty">Beauty</li>
                <li data-category="Collectibles">Collectibles</li>      
                <li data-category="Other">Other</li>  
            </ul>

            <h4 class="font-bold text-2xl py-5 w-full border-b border-gray-400 my-3">Shop By Price Tag</h4>
            <div class="space-y-4 [&>input]:border-2 [&>input]:border-normalred">
                <input id="minPrice" type="number" placeholder="Min" class="p-2 outline-none w-full">
                <span>to</span>
                <input id="maxPrice" type="number" placeholder="Max" class="p-2 outline-none w-full">
            </div>
            <button id="applyFilter" class="bg-normalred p-4 text-white font-semibold w-3/5">Apply</button>

            <h4 class="font-bold text-2xl py-5 w-full border-b border-gray-400 my-3">Help & Settings</h4>
            <ul class="[&>*]:text-gray-600">
                <li><a href="/pages/account.php">My Account</a></li>
                <li id="userEmail"></li>
                <li><a href="/pages/auth.php?type=seller">Become a Seller</a></li>
            </ul>

        </div>
        <div>
            <section id="product_section_id" class="grid grid-cols-2 
            sm:grid-cols-3 md:grid-cols-4 
            lg:grid-cols-[repeat(auto-fill,minmax(150px,1fr))] 
            gap-3 sm:gap-6 items-start content-start
            p-4 sm:p-6 lg:p-10 relative">

            <div id="loadbar" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                <div class="border-8 border-gray-700 border-t-cerulean animate-spin rounded-full w-[200px] h-[200px]"></div>
            </div>
            </section>
        <div id="page-btns" class="m-5"></div>

        </div>
    </div>
    

    <!--Reusable component-->
    <div id="footer"></div>

    
</body>

</html>
