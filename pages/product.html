<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../dist/output.css" />
    <title>Product</title>
    <script src="/javascript/includefooter.js"></script>
    <script src="/variables.js"></script>
    <script src="/javascript/includetopnav.js"></script>
    <script src="/javascript/product.js"></script>
</head>

<body>
    <div id="topnav"></div>

    <section id="item-display" class="product-section grid grid-cols-2 grid-rows-2 gap-2 m-8">

    </section>

    <section class="review-section w-8/12 h-auto mx-auto p-2 flex flex-col space-y-5 ">
        <span class="text-xl">Reviews</span>
        <div class="space-y-5" id="commenthere"></div>

        <span>Add A Review</span>

        <input id="ratingid" placeholder="Rating" type="number" class="p-5" max="5" min="0">
   
        <div class="flex flex-col space-y-5">
        <div class="border-2 border-current p-5 bg-white">
            <textarea id="txtareaid" title="REVIEWTYPE" class="w-full h-full outline-none"></textarea>
        </div>

        <button id="addreviewid" class="bg-normalred hover:bg-[#a30303] p-3 text-white">Add Review</button>
        </div>
    </section>

    <div id="footer"></div>

</body>

</html>
