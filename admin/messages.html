<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Messages</title>
    <link rel="stylesheet" href="/dist/output.css">
    <!--This is font awesome. A free supply of icons-->
    <script src="https://kit.fontawesome.com/dad52afab5.js" crossorigin="anonymous"></script>
    <script src="/variables.js"></script>
    <script src="/adminjs/includesidenav.js" defer></script>
    <script src="/adminjs/messages.js" defer></script>
</head>

<body>
 
    <!-- Report Logs Modal -->
    <div id="report-logs" class="left-1/2 top-1/2 translate-x-[-50%] translate-y-[-50%] h-screen fixed w-[500px] bg-white flex-col z-[500] hidden">
        <div id="box-topnav" class="bg-darkgray h-[10%] w-full text-white font-semibold text-lg flex flex-col relative p-4">
            <button id="report-x" class="self-end absolute top-0 right-0 bg-normalred p-3">X</button>
            <span>Reports Log</span>
        </div>
        <ul class="space-y-4 [&>*]:p-3">
            <li>#335 - Lorem ipsum dolor sit, amet consectetur adipisicing elit. Ex, accusantium.</li>
            <li>#334 - Lorem ipsum dolor sit amet consectetur adipisicing elit. Ad, ipsum!</li>
            <li>#333 - Lorem ipsum dolor sit amet consectetur adipisicing elit. Odit, reprehenderit?</li>
        </ul>
    </div>
 
    <!-- Main Admin Layout -->
    <section id="layout-admin" class="grid h-screen transition-all duration-100">
        <div id="sidebar-container"></div>
 
        <!-- Message Panel-->
        <div class="grid grid-cols-[260px_1fr] h-screen overflow-hidden">
 
            <!-- Conversations -->
            <div id="sidemsg-zone" class="flex flex-col overflow-hidden border-r border-gray-200 bg-gray-50">
 
                <!-- Section Label -->
                <div class="px-4 py-3 text-xs font-semibold uppercase tracking-widest text-gray-400 border-b border-gray-200">
                    Messages
                </div>
 
                <!-- CONVERSATION ENTRIES -->
                <div id="convo-entries" class="overflow-y-auto flex-1">
 
                </div>
            </div>
 
            <!-- Chat View -->
            <div class="flex flex-col h-screen bg-white">
 
                <!-- THE CHAT HEADER -->
                <div class="flex items-center gap-3 px-5 py-3 bg-darkgray border-b border-black flex-shrink-0">
                    <img id="header-icon" src=""
                        class="rounded-full w-8 h-8 object-cover" alt="Welt Yang">
                    <div>
                        <span id="header-username" class="text-white font-semibold text-sm block"></span>
                        <span class="text-green-400 text-xs">Online</span>
                    </div>
                    <!-- ARE THEY ONLINE -->
                    <div class="ml-auto w-2.5 h-2.5 rounded-full bg-green-400"></div>
                </div>
 
                <!-- Scrollable Message Thread -->
                <div id="scroll-zone" class="flex-1 overflow-y-auto px-6 py-6 space-y-5 bg-gray-50">
 
            </div>
        </div>
    </section>
 
    <script src="/adminjs/adminstyles.js" defer></script>
 
</body>

</html>
